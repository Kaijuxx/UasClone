<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Google Keep Clone - UAS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 800px;">
        <h1 class="text-center mb-4">💡 Keep Clone</h1>

        <!-- Form Tambah Catatan -->
        <div class="card p-3 mb-4 shadow-sm">
            <form th:action="@{/save}" th:object="${newNote}" method="POST">
                <input type="text" th:field="*{title}" class="form-control mb-2" placeholder="Judul..." required>
                <textarea th:field="*{content}" class="form-control mb-2" placeholder="Tulis catatan atau item todo..."></textarea>
                
                <div class="row g-2 align-items-center mb-2">
                    <div class="col-auto">
                        <div class="form-check">
                            <input type="checkbox" th:field="*{todo}" class="form-check-input" id="isTodo">
                            <label class="form-check-label" for="isTodo">ToDo List</label>
                        </div>
                    </div>
                    <div class="col-auto">
                        <input type="datetime-local" th:field="*{reminderTime}" class="form-control form-control-sm" title="Set Pengingat">
                    </div>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold">Simpan</button>
            </form>
        </div>

        <!-- List Catatan -->
        <div class="row">
            <div class="col-md-6 mb-3" th:each="note : ${notes}">
                <div class="card shadow-sm" th:classappend="${note.isPinned} ? 'border-warning border-2' : ''">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title" th:text="${note.title}">Judul</h5>
                            <a th:href="@{'/pin/' + ${note.id}}" class="btn btn-sm" th:classappend="${note.isPinned} ? 'btn-warning' : 'btn-outline-secondary'">📌</a>
                        </div>
                        
                        <div th:if="${note.isTodo}" class="form-check my-2">
                            <a th:href="@{'/toggle-todo/' + ${note.id}}" class="text-decoration-none text-dark">
                                <input type="checkbox" th:checked="${note.isCompleted}" class="form-check-input">
                                <span th:text="${note.content}" th:style="${note.isCompleted} ? 'text-decoration: line-through;' : ''">Isi Todo</span>
                            </a>
                        </div>
                        
                        <p th:if="${!note.isTodo}" class="card-text" th:text="${note.content}">Isi catatan...</p>
                        
                        <div th:if="${note.reminderTime != null && !note.reminderTime.isEmpty()}" class="mb-2">
                            <span class="badge bg-info text-dark">⏰ <span th:text="${note.reminderTime}"></span></span>
                        </div>

                        <div class="d-flex justify-content-end gap-1">
                            <a th:href="@{'/delete/' + ${note.id}}" class="btn btn-danger btn-sm" onclick="return confirm('Hapus catatan ini?')">Hapus</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
