<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Keep Clone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 800px;">
        <h1 class="text-center mb-4">💡 Keep Clone</h1>

        <!-- Form Tambah / Edit Catatan -->
        <div class="card p-3 mb-4 shadow-sm">
            <h5 class="mb-2 text-secondary" th:text="${newNote.id != null} ? 'Edit Catatan' : 'Tambah Catatan'">Tambah Catatan</h5>
            <form th:action="@{/save}" th:object="${newNote}" method="POST" id="mainForm">
                <input type="hidden" th:field="*{id}">

                <input type="text" th:field="*{title}" class="form-control mb-2" placeholder="Judul..." required>
                
                <div id="text-note-section">
                    <textarea id="textContent" th:field="*{content}" class="form-control mb-2" placeholder="Tulis catatan..."></textarea>
                </div>
                
                <div id="todo-note-section" class="mb-2" style="display: none;">
                    <div id="todo-inputs-container">
                        <th:block th:if="${newNote.isTodo && newNote.content != null}">
                            <div th:each="item, iter : ${#strings.arraySplit(newNote.content, ',')}" class="input-group mb-2 todo-input-item">
                                <span class="input-group-text">☐</span>
                                <input type="text" class="form-control todo-item-field" th:value="${item}" th:placeholder="'Item todo ' + ${iter.count}">
                            </div>
                        </th:block>
                        <th:block th:if="${!newNote.isTodo || newNote.content == null}">
                            <div class="input-group mb-2 todo-input-item">
                                <span class="input-group-text">☐</span>
                                <input type="text" class="form-control todo-item-field" placeholder="Item ToDo...">
                            </div>
                        </th:block>
                    </div>
                    <button type="button" class="btn btn-outline-secondary btn-sm mb-2" onclick="addTodoField()">+ Tambah Item Todo</button>
                </div>
                
                <div class="row g-2 align-items-center mb-2">
                    <div class="col-auto">
                        <div class="form-check">
                            <input type="checkbox" th:field="*{todo}" class="form-check-input" id="isTodo" onchange="toggleFormMode(this.checked)">
                            <label class="form-check-label" for="isTodo">ToDo List</label>
                        </div>
                    </div>
                    <div class="col-auto">
                        <input type="datetime-local" th:field="*{reminderTime}" class="form-control form-control-sm" title="Set Pengingat">
                    </div>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold" onclick="prepareSubmit(event)">Simpan</button>
                <a th:if="${newNote.id != null}" th:href="@{/}" class="btn btn-light w-100 btn-sm mt-1 text-secondary">Batal Edit</a>
            </form>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3" th:each="note : ${notes}">
                <div class="card shadow-sm" th:classappend="${note.isPinned} ? 'border-warning border-2' : ''">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title" th:text="${note.title}">Judul</h5>
                            <a th:href="@{'/pin/' + ${note.id}}" class="btn btn-sm" th:classappend="${note.isPinned} ? 'btn-warning' : 'btn-outline-secondary'">📌</a>
                        </div>
                        
                        <div th:if="${note.isTodo}" class="my-2">
                            <div th:each="item : ${#strings.arraySplit(note.content, ',')}" class="form-check mb-1">
                                <a th:href="@{'/toggle-todo/' + ${note.id}}" class="text-decoration-none text-dark">
                                    <input type="checkbox" th:checked="${note.isCompleted}" class="form-check-input">
                                    <span th:text="${item}" th:style="${note.isCompleted} ? 'text-decoration: line-through;' : ''">Isi Todo</span>
                                </a>
                            </div>
                        </div>
                        
                        <p th:if="${!note.isTodo}" class="card-text" th:text="${note.content}">Isi catatan...</p>
                        
                        <div th:if="${note.reminderTime != null && !note.reminderTime.isEmpty()}" class="mb-2">
                            <span class="badge bg-info text-dark">⏰ <span th:text="${note.reminderTime}"></span></span>
                        </div>

                        <div class="d-flex justify-content-end gap-1">
                            <a th:href="@{'/edit/' + ${note.id}}" class="btn btn-outline-primary btn-sm">Edit</a>
                            <a th:href="@{'/delete/' + ${note.id}}" class="btn btn-danger btn-sm" onclick="return confirm('Hapus catatan ini?')">Hapus</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script>
        function toggleFormMode(isTodoChecked) {
            const textSection = document.getElementById('text-note-section');
            const todoSection = document.getElementById('todo-note-section');
            const textContent = document.getElementById('textContent');

            if (isTodoChecked) {
                textSection.style.display = 'none';
                todoSection.style.display = 'block';
                textContent.removeAttribute('name'); 
            } else {
                textSection.style.display = 'block';
                todoSection.style.display = 'none';
                textContent.setAttribute('name', 'content');
            }
        }

        function addTodoField() {
            const container = document.getElementById('todo-inputs-container');
            const div = document.createElement('div');
            div.className = 'input-group mb-2 todo-input-item';
            
            const count = container.getElementsByClassName('todo-input-item').length + 1;
            div.innerHTML = `
                <span class="input-group-text">☐</span>
                <input type="text" class="form-control todo-item-field" placeholder="Item todo ${count}...">
            `;
            container.appendChild(div);
        }

        function prepareSubmit(event) {
            const isTodoChecked = document.getElementById('isTodo').checked;
            
            if (isTodoChecked) {
                event.preventDefault(); 
                const fields = document.getElementsByClassName('todo-item-field');
                let values = [];
                
                for (let i = 0; i < fields.length; i++) {
                    if (fields[i].value.trim() !== "") {
                        values.push(fields[i].value.replace(/,/g, ' ')); 
                    }
                }
                
                if (values.length === 0) {
                    alert("Isi minimal satu item ToDo!");
                    return;
                }

                const hiddenInput = document.createElement('input');
                hiddenInput.type = 'hidden';
                hiddenInput.name = 'content';
                hiddenInput.value = values.join(','); 
                
                const form = document.getElementById('mainForm');
                form.appendChild(hiddenInput);
                form.submit(); 
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const isTodoChecked = document.getElementById('isTodo').checked;
            toggleFormMode(isTodoChecked);
        });
    </script>
</body>
</html>
